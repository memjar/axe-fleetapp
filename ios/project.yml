name: AXEFleet
options:
  bundleIdPrefix: com.axe
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  AXEFleet:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AXEFleet
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.axe.fleet-monitor
        INFOPLIST_FILE: AXEFleet/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AXEFleet/AXEFleet.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ENABLE_PREVIEWS: true
    info:
      path: AXEFleet/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.axe.fleet-monitor.refresh
        UIBackgroundModes:
          - fetch
          - processing
    entitlements:
      path: AXEFleet/AXEFleet.entitlements
      properties:
        aps-environment: development

schemes:
  AXEFleet:
    build:
      targets:
        AXEFleet: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
